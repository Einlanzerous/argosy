name: argosy

# Local dev stack for Argosy: PostgreSQL + the Go server (hot-reload via air),
# with ffmpeg/ffprobe inside the server image. The Vue dev server is optional
# (profile: webdev) — most of the time you run `make web-dev` on the host.
#
# Ports are chosen to avoid the construct-server stack. Copy .env.example to
# .env to override. Run from the repo root with `make compose-up`.

services:
  db:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argosy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}   # dev placeholder; override in deploy/.env
      POSTGRES_DB: ${POSTGRES_DB:-argosy}
    # construct-server already binds host 5432 (loopback) — publish on 5433.
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argosy} -d ${POSTGRES_DB:-argosy}"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env        # local secrets (TMDB_API_*), gitignored
        required: false
    environment:
      ARGOSY_ADDR: ":8096"
      ARGOSY_MEDIA_DIR: "/media"
      ARGOSY_ARTWORK_DIR: "/artwork"
      # Stevedore re-sweeps every library on this interval to keep the Manifest
      # current (fsnotify is unreliable over the SMB mount). Empty/0 disables
      # the periodic sweep; on-demand POST /api/v1/scan still works.
      ARGOSY_SCAN_INTERVAL: "${ARGOSY_SCAN_INTERVAL:-15m}"
      # DSN is assembled from these parts at runtime (no connection-string literal).
      ARGOSY_DB_HOST: "db"
      ARGOSY_DB_PORT: "5432"
      ARGOSY_DB_USER: "${POSTGRES_USER:-argosy}"
      ARGOSY_DB_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      ARGOSY_DB_NAME: "${POSTGRES_DB:-argosy}"
      ARGOSY_DB_SSLMODE: "disable"
      # First-run admin bootstrap (created only if absent).
      ARGOSY_ADMIN_USERNAME: "${ARGOSY_ADMIN_USERNAME:-admin}"
      ARGOSY_ADMIN_PASSWORD: "${ARGOSY_ADMIN_PASSWORD:-changeme}"
      # LAN discovery for PIN pairing (ARGY-123) can't work from a bridge
      # network — multicast never leaves the docker bridge — so keep the
      # advertiser quiet here. To make discovery work from a container, run it
      # with host networking (and set ARGOSY_SERVER_NAME for a friendly name).
      ARGOSY_DISABLE_MDNS: "1"
    # 8096 is the production container's host port; publish the dev server on 8097
    # so the two run side by side (the container always listens on 8096).
    ports:
      - "${ARGOSY_HOST_PORT:-8097}:8096"
    # Intel iGPU passthrough for hardware transcode (ARGY-30). The render node is
    # group-owned by "render"; add the container to that GID so it can open it.
    # RENDER_GID is host-specific (`getent group render`); default matches this box.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GID:-993}"
    working_dir: /app
    volumes:
      - ..:/app                                              # source for hot reload
      - gocache:/root/.cache/go-build                        # persist Go build cache
      - gomod:/go/pkg/mod                                    # persist module cache
      - ${ARGOSY_MEDIA_DIR_HOST:-./sample-media}:/media:ro   # your media library
      - ${ARGOSY_SSD_MEDIA_DIR_HOST:-./sample-media}:/media-ssd:ro  # second library (mirrors prod SSD Library)
      - artwork:/artwork                                     # cached posters/artwork

  # Optional Vite dev server with HMR. Enable with: make compose-web
  web:
    profiles: ["webdev"]
    image: node:24-bookworm-slim
    restart: unless-stopped
    depends_on:
      - server
    working_dir: /app/web
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_DEV_PROXY: "http://server:8096"   # proxy API/stream to the server container
    ports:
      - "${WEB_HOST_PORT:-5173}:5173"
    volumes:
      - ..:/app
      - webnode:/app/web/node_modules

volumes:
  pgdata:
  gocache:
  gomod:
  webnode:
  artwork:
