root = "."
tmp_dir = "tmp"

[build]
  # -buildvcs=false: the source is bind-mounted (host-owned), so in-container
  # VCS stamping fails on "dubious ownership". Prod builds (deploy/Dockerfile)
  # exclude .git and are unaffected.
  cmd = "go build -buildvcs=false -o ./tmp/argosy ./cmd/argosy"
  bin = "./tmp/argosy"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "web", "assets", "deploy", ".git", ".github"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true

[misc]
  clean_on_exit = true
