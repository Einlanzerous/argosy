name: mobile-release

# Builds + ships the Flutter app on the v* tags that release-please cuts.
# - Android: signed APK attached to the GitHub Release; AAB to Play internal
#   track (skipped until PLAY_SERVICE_ACCOUNT_JSON is set).
# - iOS: TestFlight upload, skipped until the Apple secrets are set (ARGY-82).
# See mobile/argosy/android/RELEASE.md for the secret/runbook details.
#
# Trigger: release-please cuts the v* tag with the default GITHUB_TOKEN, and
# GitHub deliberately won't fire `on: push: tags` for token-pushed tags. So the
# real entrypoint is `workflow_call` from release-please.yml (gated on
# release_created). `workflow_dispatch` lets you build any existing tag by hand,
# and `push: tags` still catches tags pushed manually with user creds.
on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.9.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.9.0)"
        required: true
        type: string

permissions:
  contents: write # upload assets onto the release-please GitHub Release

defaults:
  run:
    working-directory: mobile/argosy

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
        with:
          # The tag when invoked by release-please / workflow_dispatch; the
          # pushed ref otherwise. At release time main HEAD == the tagged commit,
          # but checking out the tag is correct for dispatching older tags too.
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # versionName from the tag (v0.4.0 -> 0.4.0); versionCode from the run
      # number so it monotonically increases (Play requires it).
      - name: derive version
        id: ver
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: decode upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not set — see android/RELEASE.md"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - run: flutter pub get

      - name: build signed APK + AAB
        run: |
          flutter build apk --release \
            --build-name="${{ steps.ver.outputs.name }}" \
            --build-number="${{ steps.ver.outputs.code }}"
          flutter build appbundle --release \
            --build-name="${{ steps.ver.outputs.name }}" \
            --build-number="${{ steps.ver.outputs.code }}"

      - name: attach APK to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             "argosy-${{ steps.ver.outputs.name }}.apk"
          gh release upload "${{ steps.ver.outputs.tag }}" \
            "argosy-${{ steps.ver.outputs.name }}.apk" --clobber

      # --- Play internal track: only when the service account secret exists ---
      - name: gate on Play secret
        id: play
        run: |
          if [ -n "$PLAY_JSON" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT"; fi
      - name: write Play service account
        if: steps.play.outputs.enabled == 'true'
        run: printf '%s' "$PLAY_JSON" > play-service-account.json
      - name: upload to Play internal track
        if: steps.play.outputs.enabled == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: mobile/argosy/play-service-account.json
          packageName: dev.dodson.argosy
          releaseFiles: mobile/argosy/build/app/outputs/bundle/release/app-release.aab
          track: internal
      - name: note when Play is skipped
        if: steps.play.outputs.enabled != 'true'
        run: echo "::notice::Play upload skipped — PLAY_SERVICE_ACCOUNT_JSON not set (see android/RELEASE.md)."

  # Secrets can't be referenced in a job-level `if:`, so surface Apple-secret
  # presence from a cheap ubuntu job. This keeps the 10x-billed macOS runner
  # (and its stub failure) from ever spinning up until the Apple secrets exist.
  check-apple:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.c.outputs.enabled }}
    steps:
      - id: c
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          if [ -n "$ASC_KEY_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::TestFlight upload skipped — Apple secrets not set (ARGY-82; see ios/RELEASE.md)."
          fi

  ios:
    # Stub: builds + uploads to TestFlight once the Apple secrets exist (ARGY-82).
    # Gated so no macOS minutes are spent — and the release run stays green —
    # until then. The final step intentionally fails as a not-yet-implemented
    # marker once Apple secrets are added.
    needs: check-apple
    if: needs.check-apple.outputs.enabled == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # Real signing + `flutter build ipa` + upload (fastlane pilot /
      # apple-actions/upload-testflight-build) wired in once certs exist —
      # the portal steps are framework-independent. See ios/RELEASE.md.
      - name: build + upload (pending Apple account)
        run: |
          echo "Wire flutter build ipa + TestFlight upload here — see ios/RELEASE.md"
          exit 1
