name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: argosy
          POSTGRES_DB: argosy_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argosy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: prepare embed dir
        run: make ensure-embed
      - name: go vet
        run: go vet ./cmd/... ./internal/...
      - name: gofmt
        run: |
          out="$(gofmt -l cmd internal)"
          if [ -n "$out" ]; then echo "needs gofmt:"; echo "$out"; exit 1; fi
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./cmd/... ./internal/...
      - name: test
        env:
          PGUSER: argosy
          PGHOST: localhost
          PGPORT: "5432"
          PGDATABASE: argosy_test
        run: |
          export ARGOSY_TEST_DATABASE_URL="postgres://${PGUSER}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"
          make test
      - name: build
        run: make go-build

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  openapi-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: regenerate from the OpenAPI spec
        run: make generate
      - name: fail if generated code is out of sync
        run: git diff --exit-code
