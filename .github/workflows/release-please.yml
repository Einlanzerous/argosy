name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # For a root component (path `.`) v4 exposes UN-prefixed outputs
      # (`releases_created`, `tag_name`); the `<path>--` prefix is only for
      # non-root monorepo paths. Using `.--tag_name` here returned empty, so the
      # mobile build fell back to github.ref_name (`main`) and failed at upload.
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please cuts the v* tag with GITHUB_TOKEN, which can't fire a
  # downstream `on: push: tags` run — so trigger the signed mobile build here,
  # in the same (real-user push-to-main) run, once a release was actually cut.
  mobile-release:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/mobile-release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
