openapi: 3.0.3
info:
  title: Argosy API
  version: 0.1.0
  description: |
    Self-hosted media streaming server. This spec is the single source of truth
    for the HTTP contract; the Go server interface and the TypeScript client are
    generated from it (`make generate`), and CI fails on drift.

servers:
  - url: /

tags:
  - name: system
  - name: auth

paths:
  /healthz:
    get:
      tags: [system]
      operationId: getHealth
      summary: Liveness/readiness probe
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok
        "503":
          description: A dependency (e.g. the database) is unavailable

  /api/v1/ping:
    get:
      tags: [system]
      operationId: ping
      summary: Service identity and version
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"

  /api/v1/scan:
    post:
      tags: [library]
      operationId: triggerScan
      summary: Trigger an immediate library re-scan ("rebuild the Manifest")
      responses:
        "202":
          description: A scan sweep was queued
        "409":
          description: A scan sweep is already running or queued
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/scan/status:
    get:
      tags: [library]
      operationId: getScanStatus
      summary: Current/last scan sweep status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Authenticate an account and list its profiles
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; returns the account and its profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/devices:
    post:
      tags: [auth]
      operationId: registerDevice
      summary: Register a device for a profile and issue a device token
      description: |
        Re-authenticates with account credentials and binds a new device to the
        chosen profile, returning a bearer token used for all subsequent calls.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRegistrationRequest"
      responses:
        "201":
          description: Device registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceRegistrationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [auth]
      operationId: listDevices
      summary: List devices in the current account (the Fleet)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/devices/switch:
    post:
      tags: [auth]
      operationId: switchDeviceProfile
      summary: Re-bind the calling device to another profile (in-place switch)
      description: >
        Re-points the calling device to a different profile in the same account
        without re-pairing — the device token is unchanged. Switching INTO an
        admin profile requires the account password so a viewer device can't
        silently assume admin. Returns the refreshed session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceSwitchRequest"
      responses:
        "200":
          description: Switched; the session reflects the new profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/devices/{deviceId}:
    delete:
      tags: [auth]
      operationId: revokeDevice
      summary: Revoke a device token ("retire from the Fleet")
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Device revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [auth]
      operationId: renameDevice
      summary: Rename a device in the Fleet
      description: >
        Give a device a friendly label. Admins may rename any device in the
        account; a viewer may rename only their own.
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRenameRequest"
      responses:
        "200":
          description: Renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/profiles:
    get:
      tags: [auth]
      operationId: listProfiles
      summary: List the current account's profiles
      description: >
        Returns every profile in the caller's account with its role and how many
        active devices are bound to it. Any signed-in profile may list; creating,
        editing, and deleting profiles is admin-only.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [auth]
      operationId: createProfile
      summary: Create a profile (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileCreateRequest"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/auth/profiles/{userId}:
    patch:
      tags: [auth]
      operationId: updateProfile
      summary: Rename a profile or change its role (admin only)
      description: >
        Omit a field to leave it unchanged. Demoting the only remaining admin to
        viewer is rejected so an account can never lock itself out.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [auth]
      operationId: deleteProfile
      summary: Delete a profile (admin only)
      description: >
        Devices bound to the deleted profile are unbound — they keep working but
        drop to viewer access until reassigned. The account must keep at least
        one admin, and you can't delete the profile you're currently signed in as.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Profile deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/auth/link/start:
    post:
      tags: [auth]
      operationId: startLink
      summary: Begin code-pairing — mint a short code for the new device to display
      description: |
        A new device (TV or phone, which shouldn't have to type credentials)
        calls this to get a short pairing code. It displays the code, then polls
        `GET /auth/link/{code}` until an authenticated user approves it and a
        device token is handed back. The optional body lets the device announce
        what it is, so the approver sees "Pixel 9 (android)" instead of a bare
        code and the created Fleet device is named/typed correctly.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkStartRequest"
      responses:
        "201":
          description: Pairing code created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkStartResponse"

  /api/v1/auth/link/{code}:
    get:
      tags: [auth]
      operationId: getLinkStatus
      summary: Poll a pairing code; returns the device token once approved
      description: |
        The new device polls this. While pending, `status` is `pending`. Once
        approved, it returns `status: approved` plus the one-time device
        `token`, and the code is consumed (single use). While pending it also
        echoes the device-announced `deviceName`/`platform` so an approving UI
        can show what is about to be linked.
      security: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current status (the token is present once approved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/link/{code}/approve:
    post:
      tags: [auth]
      operationId: approveLink
      summary: Approve a pairing code from a signed-in session
      description: >
        Called from an authenticated session (web or mobile). Links the new
        device to the caller's account and profile by creating a device; the
        new device claims its token on the next poll.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkApproveRequest"
      responses:
        "204":
          description: Approved; the TV will claim its token on its next poll
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The code was already approved

  /api/v1/preferences:
    get:
      tags: [auth]
      operationId: getDevicePreferences
      summary: Get the calling device's playback preferences
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevicePreferences"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [auth]
      operationId: setDevicePreferences
      summary: Update the calling device's playback preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevicePreferences"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevicePreferences"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/user/preferences:
    get:
      tags: [auth]
      operationId: getUserPreferences
      summary: Get the calling profile's account-wide preferences
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [auth]
      operationId: setUserPreferences
      summary: Update the calling profile's account-wide preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferences"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [auth]
      operationId: getCurrentSession
      summary: Resolve the current (account, profile, device) from the token
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/libraries:
    get:
      tags: [library]
      operationId: listLibraries
      summary: List the account's libraries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [library]
      operationId: createLibrary
      summary: Register a new media library (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateLibraryRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Library" }
        "400":
          description: Invalid path (not an existing directory) or missing fields
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin only

  /api/v1/libraries/{libraryId}:
    delete:
      tags: [library]
      operationId: deleteLibrary
      summary: Remove a library and its items (admin only)
      parameters:
        - { name: libraryId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin only
        "404":
          description: Not found

  /api/v1/libraries/{libraryId}/movies:
    get:
      tags: [library]
      operationId: listMovies
      summary: Browse movies in a library
      parameters:
        - { name: libraryId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
        - { name: sort, in: query, schema: { type: string, enum: [title, added, year, rating], default: title } }
        - { name: genre, in: query, description: "Filter to items in any of these genres (repeatable).", style: form, explode: true, schema: { type: array, items: { type: string } } }
        - { name: rating_min, in: query, description: "Minimum effective rating (0–10).", schema: { type: number, minimum: 0, maximum: 10 } }
        - { name: watched, in: query, description: "Per-user watched state.", schema: { type: string, enum: [watched, unwatched, in_progress] } }
        - { name: year_from, in: query, description: "Earliest release year (inclusive).", schema: { type: integer } }
        - { name: year_to, in: query, description: "Latest release year (inclusive).", schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItemPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/libraries/{libraryId}/series:
    get:
      tags: [library]
      operationId: listSeries
      summary: Browse series in a library
      parameters:
        - { name: libraryId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
        - { name: sort, in: query, schema: { type: string, enum: [title, year, rating], default: title } }
        - { name: genre, in: query, description: "Filter to series in any of these genres (repeatable).", style: form, explode: true, schema: { type: array, items: { type: string } } }
        - { name: rating_min, in: query, description: "Minimum effective rating (0–10).", schema: { type: number, minimum: 0, maximum: 10 } }
        - { name: watched, in: query, description: "Per-user watched state (aggregated over episodes).", schema: { type: string, enum: [watched, unwatched, in_progress] } }
        - { name: year_from, in: query, description: "Earliest release year (inclusive).", schema: { type: integer } }
        - { name: year_to, in: query, description: "Latest release year (inclusive).", schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/search:
    get:
      tags: [library]
      operationId: search
      summary: Full-text search across the account's films and series
      description: >-
        Ranked full-text search over titles, genres, cast/crew, and
        overviews, scoped to the calling account's libraries. Results are grouped
        by kind (films vs. series). The query supports typeahead — the last token
        of each word is treated as a prefix.
      parameters:
        - { name: q, in: query, required: true, description: "Search text (prefix-matched per token).", schema: { type: string } }
        - { name: limit, in: query, description: "Max results per group.", schema: { type: integer, default: 8, minimum: 1, maximum: 25 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/facets:
    get:
      tags: [library]
      operationId: listFacets
      summary: Most common genres across the account's manifest
      description: >-
        The most-used genres across the account's films and series, ranked by
        item count — used to surface discovery chips.
      parameters:
        - { name: limit, in: query, description: "Max facets to return.", schema: { type: integer, default: 8, minimum: 1, maximum: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Facet" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/vaults:
    get:
      tags: [library]
      operationId: listVaults
      summary: List vaults visible to the current profile (own + shared)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Vault" } }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [library]
      operationId: createVault
      summary: Create a vault
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVaultRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vault" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/vaults/{vaultId}:
    get:
      tags: [library]
      operationId: getVault
      summary: Vault detail with its items
      parameters:
        - { name: vaultId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VaultDetail" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found or not visible
    patch:
      tags: [library]
      operationId: updateVault
      summary: Rename / re-describe / toggle sharing (owner or admin)
      parameters:
        - { name: vaultId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateVaultRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vault" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not permitted
        "404":
          description: Not found
    delete:
      tags: [library]
      operationId: deleteVault
      summary: Delete a vault (owner or admin)
      parameters:
        - { name: vaultId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not permitted
        "404":
          description: Not found

  /api/v1/vaults/{vaultId}/items:
    post:
      tags: [library]
      operationId: addVaultItem
      summary: Add a film or series to a vault
      parameters:
        - { name: vaultId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddVaultItemRequest" }
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VaultEntry" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not permitted
        "404":
          description: Vault not found

  /api/v1/vaults/{vaultId}/items/{entryId}:
    delete:
      tags: [library]
      operationId: removeVaultItem
      summary: Remove an item from a vault
      parameters:
        - { name: vaultId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: entryId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not permitted
        "404":
          description: Not found

  /api/v1/vaults/{vaultId}/order:
    put:
      tags: [library]
      operationId: reorderVault
      summary: Reorder a vault's items
      parameters:
        - { name: vaultId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReorderVaultRequest" }
      responses:
        "204":
          description: Reordered
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not permitted
        "404":
          description: Not found

  /api/v1/series/{seriesId}:
    get:
      tags: [library]
      operationId: getSeries
      summary: Series detail with seasons and episodes
      parameters:
        - { name: seriesId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/items/{itemId}:
    get:
      tags: [library]
      operationId: getMediaItem
      summary: Media item detail with effective metadata
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItemDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/items/{itemId}/stream:
    get:
      tags: [library]
      operationId: streamItem
      summary: Direct-play media stream with HTTP range support
      description: |
        Streams the item's media file with byte-range support (seeking). Auth is
        the per-device token via the bearer header OR a `token` query param,
        since an HTML5 `<video>` element cannot set Authorization.
      security: []
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: token, in: query, description: "Per-device token (alternative to the bearer header).", schema: { type: string } }
      responses:
        "200":
          description: Full media content
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "206":
          description: Partial content (range request)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/items/{itemId}/subtitles:
    get:
      tags: [library]
      operationId: listSubtitles
      summary: Available subtitle tracks for an item
      description: |
        Lists subtitle tracks resolved through the priority chain: embedded text
        tracks (from the container) plus OpenSubtitles candidates when configured.
        Each track's `id` is fetched as WebVTT from the sibling endpoint.
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubtitleTrack"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/items/{itemId}/subtitles/{trackId}:
    get:
      tags: [library]
      operationId: getSubtitle
      summary: A subtitle track as WebVTT
      description: |
        Produces (and disk-caches) the track as WebVTT. Auth is the per-device
        token via the bearer header OR a `token` query param, since an HTML5
        `<track>` element cannot set Authorization.
      security: []
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: trackId, in: path, required: true, description: "Track id from the list endpoint (e.g. `embedded:3`, `os:12345`).", schema: { type: string } }
        - { name: token, in: query, description: "Per-device token (alternative to the bearer header).", schema: { type: string } }
      responses:
        "200":
          description: WebVTT subtitle
          content:
            text/vtt:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Subtitle could not be produced (e.g. external fetch failed)

  /api/v1/items/{itemId}/playback:
    get:
      tags: [library]
      operationId: getPlaybackInfo
      summary: Direct-play capability decision for the item
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/items/{itemId}/next-episode:
    get:
      tags: [library]
      operationId: getNextEpisode
      summary: The next episode after this one in its series
      description: |
        Given a series episode, returns the next playable episode in season/
        episode order — rolling across season boundaries to the next season's
        first episode. Returns 404 when the item is the last episode of the
        series, has no following playable episode, or isn't a series episode at
        all (e.g. a film). Powers the player's auto-advance "Up Next" overlay.
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnDeckItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/items/{itemId}/progress:
    get:
      tags: [library]
      operationId: getProgress
      summary: Current play-state (resume position) for the item
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [library]
      operationId: reportProgress
      summary: Heartbeat — upsert the resume position for the current profile
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressUpdate"
      responses:
        "200":
          description: Updated play-state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/items/{itemId}/watched:
    post:
      tags: [library]
      operationId: setWatched
      summary: Mark an item watched / unwatched for the current profile
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchedUpdate"
      responses:
        "200":
          description: Updated play-state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/series/{seriesId}/watched:
    post:
      tags: [library]
      operationId: setSeriesWatched
      summary: Mark every episode of a series watched / unwatched for the current profile
      parameters:
        - { name: seriesId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchedUpdate"
      responses:
        "200":
          description: Number of backing files whose watched state was set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedBulkResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/seasons/{seasonId}/watched:
    post:
      tags: [library]
      operationId: setSeasonWatched
      summary: Mark every episode of a season watched / unwatched for the current profile
      parameters:
        - { name: seasonId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchedUpdate"
      responses:
        "200":
          description: Number of backing files whose watched state was set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchedBulkResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/continue:
    get:
      tags: [library]
      operationId: listContinue
      summary: Continue-watching / on-deck items for the current profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContinueItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ondeck:
    get:
      tags: [library]
      operationId: listOnDeck
      summary: On-deck (up-next) episodes for series the user is currently watching
      description: >
        The next unstarted episode of each series the current profile has made
        progress in — i.e. has watched at least one episode and has a later
        episode not yet started. Excludes in-progress items (those live in
        /continue), so the two rows don't overlap. Newest activity first.
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OnDeckItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/recent:
    get:
      tags: [library]
      operationId: listRecent
      summary: Recently-added items (films + series) across the account
      description: >
        A unified "newly arrived" feed across every library: standalone films
        and series, newest first. A series' arrival time is the most recent of
        its episodes' added-at timestamps, so adding an episode resurfaces the
        series (deduped to a single card) rather than listing each episode.
        Each item's `kind` is "movie" or "series".
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 24, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaItemSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/sessions:
    get:
      tags: [library]
      operationId: listPlaybackSessions
      summary: Live playback sessions (who's watching what, where, now)
      description: >
        Active playback sessions, most-recently-active first. Admins see the
        whole account; a viewer sees only their own. A session that owns a
        transcode session is annotated with its encoder + method (reconciled
        with The Helm).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlaybackSession"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/beacon:
    get:
      tags: [library]
      operationId: beaconStream
      summary: SSE stream of the current user's live play-state events (Beacon)
      description: >
        Server-Sent Events stream of play_state changes for the authenticated
        user, powering cross-device resume/handoff. Authenticates via ?token=
        (an EventSource cannot set the Authorization header). Each message is
        `event: position` with a JSON data payload (see PlaybackSession-like
        fields). The client (EventSource) auto-reconnects; on reconnect it
        reconciles missed updates via a /continue or /progress fetch.
      parameters:
        - name: token
          in: query
          required: false
          schema: { type: string }
          description: Per-device bearer token (EventSource can't set headers).
      responses:
        "200":
          description: An SSE event stream
          content:
            text/event-stream:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/items/{itemId}/transcode:
    post:
      tags: [transcode]
      operationId: startTranscode
      summary: Start (or join) an HLS transcode session for an item
      description: |
        Starts a server-side transcode and returns the session plus its HLS
        playlist URL. Repeat requests for the same item + offset join the
        existing session instead of spawning a second ffmpeg. Returns 503 when
        the server is at its transcode-session limit (back-pressure).
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscodeStartRequest"
      responses:
        "202":
          description: Session started or joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscodeSession"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: At transcode-session capacity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/transcode/sessions:
    get:
      tags: [transcode]
      operationId: listTranscodeSessions
      summary: Live transcode sessions for the current account (The Helm)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranscodeSession"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/transcode/capabilities:
    get:
      tags: [transcode]
      operationId: getTranscodeCapabilities
      summary: Encoders available on this host and the selected one
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscodeCapabilities"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/transcode/cache:
    get:
      tags: [transcode]
      operationId: getTranscodeCache
      summary: Transcode cache usage (Ballast)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscodeCacheStats"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/transcode/{sessionId}:
    delete:
      tags: [transcode]
      operationId: stopTranscode
      summary: Stop a transcode session and purge its output
      parameters:
        - { name: sessionId, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Stopped
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/transcode/{sessionId}/{file}:
    get:
      tags: [transcode]
      operationId: getTranscodeFile
      summary: HLS artifact for a session (master/variant playlist, init, or segment)
      description: |
        Serves a session's HLS artifacts: the master playlist (`index.m3u8`),
        per-variant playlists (`stream_N.m3u8`), fMP4 init segments
        (`init_N.mp4`), and media segments (`stream_N_NNNNN.m4s`). The filename
        is allow-listed server-side. `index.m3u8` returns 503 while the session
        is still starting (no playlist written yet).
      parameters:
        - { name: sessionId, in: path, required: true, schema: { type: string } }
        - { name: file, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: HLS playlist or segment
          content:
            application/vnd.apple.mpegurl:
              schema: { type: string }
            video/mp4:
              schema: { type: string, format: binary }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          description: Session still starting (no playlist yet)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Per-device token issued by registerDevice.

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: The request was malformed or failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The request conflicts with the current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    TranscodeStartRequest:
      type: object
      properties:
        startAt:
          type: number
          format: double
          description: Seek offset in seconds (default 0).
        hevc:
          type: boolean
          description: >
            Whether the client can play HEVC (H.265) in fMP4/MSE — detected via
            MediaSource.isTypeSupported. When true, an HEVC source is remuxed
            (copied) at native resolution including 4K instead of being
            re-encoded to H.264 1080p, and re-encodes of >1080p sources target
            HEVC. Defaults to false (H.264 only).

    TranscodeProgress:
      type: object
      required: [outTimeMs, speed, fps]
      properties:
        outTimeMs:
          type: integer
          format: int64
          description: Encoded timeline position in milliseconds.
        speed:
          type: number
          format: double
          description: Encode speed as a multiple of realtime (2.5 == 2.5x).
        fps:
          type: number
          format: double

    TranscodeSession:
      type: object
      required: [id, itemId, encoder, method, state, startAt, startedAt, playlistUrl, progress]
      properties:
        id:
          type: string
        itemId:
          type: string
          format: uuid
        encoder:
          type: string
        method:
          type: string
          enum: [remux, transcode]
          description: Whether this session copies codecs (remux) or re-encodes (transcode).
        state:
          type: string
          enum: [starting, running, complete, failed, stopped]
        startAt:
          type: number
          format: double
        startedAt:
          type: string
          format: date-time
        playlistUrl:
          type: string
          description: Relative URL of the HLS media playlist for this session.
        error:
          type: string
        progress:
          $ref: "#/components/schemas/TranscodeProgress"

    TranscodeCacheStats:
      type: object
      required: [totalBytes, budgetBytes, sessionDirs, liveDirs]
      properties:
        totalBytes: { type: integer, format: int64 }
        budgetBytes: { type: integer, format: int64 }
        sessionDirs: { type: integer }
        liveDirs: { type: integer }

    SubtitleTrack:
      type: object
      required: [id, source, language, label, forced, default]
      properties:
        id:
          type: string
          description: Track handle for the WebVTT endpoint (e.g. "embedded:3", "os:12345").
        source:
          type: string
          enum: [embedded, opensubtitles]
        language:
          type: string
          description: BCP-47 language code (e.g. "en"), or "und" when unknown.
        label:
          type: string
          description: Human-readable label for the subtitle picker.
        forced:
          type: boolean
        default:
          type: boolean

    TranscodeCapabilities:
      type: object
      required: [available, selected]
      properties:
        available:
          type: array
          items:
            type: string
          description: Encoder backends usable on this host (always includes "software").
        selected:
          type: string
          description: The encoder chosen by the configured preference order.

    PingResponse:
      type: object
      required: [service, status, version]
      properties:
        service:
          type: string
          example: argosy
        status:
          type: string
          example: ok
        version:
          type: string
          example: dev

    Role:
      type: string
      enum: [admin, viewer]

    Account:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    UserProfile:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [account, profiles]
      properties:
        account:
          $ref: "#/components/schemas/Account"
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"

    DeviceRegistrationRequest:
      type: object
      required: [username, password, userId, deviceName]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        userId:
          type: string
          format: uuid
          description: The profile this device is bound to.
        deviceName:
          type: string
        platform:
          type: string
          description: Client platform/type label (e.g. "web", "tv", "phone"); shown in the Fleet.
        installId:
          type: string
          description: >-
            Stable per-install identifier the client persists across re-pairs.
            When present, a re-pair from the same physical device updates its
            existing Fleet row instead of creating a duplicate (ARGY-99). Omit to
            get a fresh device row each time.

    Device:
      type: object
      required: [id, name, userId, revoked, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        platform:
          type: string
          nullable: true
          description: Client platform/type label captured at registration.
        userId:
          type: string
          format: uuid
          nullable: true
        userName:
          type: string
          nullable: true
          description: Display name of the profile this device is bound to (the Fleet shows whose device it is).
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        revoked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    DeviceRenameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    DeviceSwitchRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
          description: The profile (in the same account) to bind this device to.
        password:
          type: string
          format: password
          description: >-
            Account password. Required only when switching INTO an admin profile;
            ignored for viewer targets.

    ProfileSummary:
      type: object
      required: [id, name, role, deviceCount]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
        deviceCount:
          type: integer
          description: Number of active (non-revoked) devices currently bound to this profile.

    ProfileCreateRequest:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"

    ProfileUpdateRequest:
      type: object
      description: Fields to change; omit a field to leave it unchanged.
      properties:
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"

    UserPreferences:
      type: object
      required: [homeLayout]
      properties:
        homeLayout:
          type: string
          enum: [focused, discovery]
          description: "Home density — focused trims to personal rows; discovery shows everything."

    DevicePreferences:
      type: object
      required: [subtitleEnabled]
      properties:
        subtitleLanguage:
          type: string
          nullable: true
          description: Preferred subtitle language (ISO code); the player auto-selects a matching track.
        subtitleEnabled:
          type: boolean
          description: Whether subtitles are on by default.
        audioLanguage:
          type: string
          nullable: true
          description: Preferred audio language (ISO code). Persisted; applied once audio-track selection ships.
        captionScale:
          type: number
          nullable: true
          description: Caption font scale (1.0 = default).
        captionColor:
          type: string
          nullable: true
          description: Caption text color (hex).
        captionBackground:
          type: string
          nullable: true
          enum: [translucent, solid, none]
          description: Caption background box style.
        captionPosition:
          type: string
          nullable: true
          enum: [bottom, raised, higher]
          description: >-
            Vertical caption placement: bottom (near the edge), raised (default,
            lifted above the control bar), or higher (further up the frame).
        seriesAutoAdvance:
          type: boolean
          nullable: true
          description: >-
            Whether finishing a series episode auto-plays the next one. Defaults
            to true (on) when unset.

    DeviceRegistrationResponse:
      type: object
      required: [device, token]
      properties:
        device:
          $ref: "#/components/schemas/Device"
        token:
          type: string
          description: Bearer token for this device.

    LinkStartRequest:
      type: object
      properties:
        deviceName:
          type: string
          description: >-
            The new device's suggested Fleet name (e.g. "Pixel 9"). The approver
            may override it.
        platform:
          type: string
          description: >-
            The new device's platform (android, ios, androidtv, web). Defaults
            to androidtv for older clients that send no body.

    LinkStartResponse:
      type: object
      required: [code, expiresAt]
      properties:
        code:
          type: string
          description: Short, unambiguous pairing code the new device displays.
        expiresAt:
          type: string
          format: date-time

    LinkStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, approved]
        token:
          type: string
          nullable: true
          description: >-
            The device bearer token, present once the code is approved. Returned
            exactly once — the code is consumed on the poll that returns it.
        deviceName:
          type: string
          nullable: true
          description: The name the new device announced at start, if any.
        platform:
          type: string
          nullable: true
          description: The platform the new device announced at start, if any.

    LinkApproveRequest:
      type: object
      properties:
        deviceName:
          type: string
          description: >-
            Friendly name for the device in the Fleet. Overrides the name the
            device announced at start; falls back to "Living Room TV" when
            neither side names it.

    Session:
      type: object
      required: [accountId, userId, deviceId, role]
      properties:
        accountId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/Role"

    ScanLibraryResult:
      type: object
      required: [libraryId, name, scanned, errors]
      properties:
        libraryId: { type: string, format: uuid }
        name: { type: string }
        scanned: { type: integer }
        errors: { type: integer }
        error: { type: string }
      additionalProperties: false

    ScanStatus:
      type: object
      required: [running, libraries]
      properties:
        running: { type: boolean }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        libraries: { type: array, items: { $ref: "#/components/schemas/ScanLibraryResult" } }

    PlaybackInfo:
      type: object
      required: [directPlay, method, container]
      properties:
        directPlay: { type: boolean }
        method:
          type: string
          enum: [direct, remux, transcode]
          description: Cheapest playable path — serve as-is, repackage (copy codecs), or re-encode.
        container: { type: string }
        videoCodec: { type: string, nullable: true }
        audioCodec: { type: string, nullable: true }
        reason: { type: string, nullable: true }

    PlayState:
      type: object
      required: [positionSeconds, watched]
      properties:
        positionSeconds: { type: number }
        durationSeconds: { type: number, nullable: true }
        watched: { type: boolean }
        updatedAt: { type: string, format: date-time, nullable: true }

    ProgressUpdate:
      type: object
      required: [positionSeconds]
      properties:
        positionSeconds: { type: number }
        durationSeconds: { type: number, nullable: true }

    WatchedUpdate:
      type: object
      required: [watched]
      properties:
        watched: { type: boolean }

    WatchedBulkResult:
      type: object
      required: [updated]
      properties:
        updated: { type: integer, description: "Backing files whose watched state was written." }

    PlaybackSession:
      type: object
      required: [userId, deviceId, itemId, positionSeconds, state, startedAt, lastSeen]
      properties:
        userId: { type: string, format: uuid }
        deviceId: { type: string, format: uuid }
        itemId: { type: string, format: uuid }
        positionSeconds: { type: number, format: double }
        durationSeconds: { type: number, format: double, nullable: true }
        state: { type: string, description: "e.g. \"playing\"" }
        startedAt: { type: string, format: date-time }
        lastSeen: { type: string, format: date-time }
        encoder: { type: string, nullable: true, description: "Encoder of the owned transcode session, if any." }
        method: { type: string, nullable: true, description: "remux | transcode, if this session owns a transcode session." }

    ContinueItem:
      type: object
      required: [id, kind, title, positionSeconds, percent]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string }
        title: { type: string }
        year: { type: integer, nullable: true }
        posterUrl: { type: string, nullable: true }
        backdropUrl: { type: string, nullable: true, description: "Landscape backdrop for full-screen heroes; falls back to posterUrl." }
        positionSeconds: { type: number }
        durationSeconds: { type: number, nullable: true }
        percent: { type: number }
        seriesId: { type: string, format: uuid, nullable: true }
        seriesTitle: { type: string, nullable: true }
        lastPlayedDevice:
          allOf: [{ $ref: "#/components/schemas/DeviceRef" }]
          nullable: true
          description: "The deck that last owned this playhead, set only when it differs from the requesting device — drives the cross-device \"⇄ left off on\" pill (ARGY-98)."

    DeviceRef:
      type: object
      description: "Slim device reference (id + display name + platform) for cross-device UI like the resume pill."
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        platform: { type: string, nullable: true, description: "web | phone | tv | ..." }

    OnDeckItem:
      type: object
      required: [id, seriesId, seriesTitle, seasonNumber, episodeNumber]
      properties:
        id: { type: string, format: uuid, description: "The episode's playable media-item id." }
        seriesId: { type: string, format: uuid }
        seriesTitle: { type: string }
        seasonNumber: { type: integer }
        episodeNumber: { type: integer }
        title: { type: string, nullable: true, description: "Episode title." }
        posterUrl: { type: string, nullable: true }
        backdropUrl: { type: string, nullable: true, description: "Landscape backdrop; falls back to posterUrl." }
        durationSeconds: { type: number, nullable: true }

    Vault:
      type: object
      required: [id, name, shared, ownerId, ownerName, itemCount, isOwner]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        shared: { type: boolean, description: "Visible to and curatable by the whole household." }
        ownerId: { type: string, format: uuid }
        ownerName: { type: string }
        itemCount: { type: integer }
        isOwner: { type: boolean, description: "Whether the calling profile owns this vault." }

    VaultEntry:
      type: object
      required: [entryId, kind, id, title]
      properties:
        entryId: { type: string, format: uuid, description: "The vault membership id (for remove/reorder)." }
        kind: { type: string, enum: [movie, series] }
        id: { type: string, format: uuid, description: "The film or series id (for routing)." }
        title: { type: string }
        year: { type: integer, nullable: true }
        posterUrl: { type: string, nullable: true }
        backdropUrl: { type: string, nullable: true }
        rating: { type: number, nullable: true }

    VaultDetail:
      type: object
      required: [id, name, shared, ownerId, ownerName, itemCount, isOwner, canEdit, items]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        shared: { type: boolean }
        ownerId: { type: string, format: uuid }
        ownerName: { type: string }
        itemCount: { type: integer }
        isOwner: { type: boolean }
        canEdit: { type: boolean, description: "Whether the calling profile may add/remove/reorder items." }
        items: { type: array, items: { $ref: "#/components/schemas/VaultEntry" } }

    CreateVaultRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        shared: { type: boolean, default: false }

    UpdateVaultRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        shared: { type: boolean }

    AddVaultItemRequest:
      type: object
      description: "Exactly one of movieId or seriesId."
      properties:
        movieId: { type: string, format: uuid, nullable: true }
        seriesId: { type: string, format: uuid, nullable: true }

    ReorderVaultRequest:
      type: object
      required: [entryIds]
      properties:
        entryIds: { type: array, items: { type: string, format: uuid }, description: "Entry ids in the desired order." }

    Library:
      type: object
      required: [id, name, kind]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string }
        rootPath: { type: string, nullable: true, description: "Server-side media root (admin only)." }

    CreateLibraryRequest:
      type: object
      required: [name, path]
      properties:
        name: { type: string }
        path: { type: string, description: "Absolute path on the server; must be an existing directory." }
        kind: { type: string, enum: [movie, show, mixed], default: mixed }

    MediaItemSummary:
      type: object
      required: [id, kind, title]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string }
        title: { type: string }
        year: { type: integer, nullable: true }
        posterUrl: { type: string, nullable: true }
        backdropUrl: { type: string, nullable: true, description: "Landscape backdrop for full-screen heroes; falls back to posterUrl." }
        rating: { type: number, nullable: true, description: "Effective provider rating, 0–10." }

    MediaItemDetail:
      type: object
      required: [id, kind, title, filePath, reviewRequired]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string }
        title: { type: string }
        year: { type: integer, nullable: true }
        overview: { type: string, nullable: true }
        genres: { type: array, items: { type: string } }
        posterUrl: { type: string, nullable: true }
        backdropUrl: { type: string, nullable: true, description: "Landscape backdrop for full-screen heroes; falls back to posterUrl." }
        durationSeconds: { type: number, nullable: true }
        container: { type: string, nullable: true }
        filePath: { type: string }
        reviewRequired: { type: boolean }
        rating: { type: number, nullable: true, description: "Effective provider rating, 0–10." }
        cast: { type: array, items: { type: string }, description: "Top-billed cast names (plus the director, for films) from the metadata provider. Omitted when none." }

    MediaItemPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MediaItemSummary" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    SeriesSummary:
      type: object
      required: [id, title]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        year: { type: integer, nullable: true }
        posterUrl: { type: string, nullable: true }
        backdropUrl: { type: string, nullable: true, description: "Landscape backdrop for full-screen heroes; falls back to posterUrl." }
        rating: { type: number, nullable: true, description: "Effective provider rating, 0–10." }

    SeriesPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/SeriesSummary" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    SearchResults:
      type: object
      required: [movies, series]
      properties:
        movies: { type: array, items: { $ref: "#/components/schemas/MediaItemSummary" } }
        series: { type: array, items: { $ref: "#/components/schemas/SeriesSummary" } }

    Facet:
      type: object
      required: [type, value, count]
      properties:
        type: { type: string, enum: [genre], description: "Which dimension the value belongs to." }
        value: { type: string }
        count: { type: integer, description: "Number of films + series carrying it." }

    EpisodeSummary:
      type: object
      required: [id, episodeNumber]
      properties:
        id: { type: string, format: uuid }
        episodeNumber: { type: integer }
        title: { type: string, nullable: true }
        overview: { type: string, nullable: true, description: "Per-episode synopsis from the metadata provider." }
        stillUrl: { type: string, nullable: true, description: "Episode still (16:9 landscape) image URL, or null when none." }
        mediaItemId: { type: string, format: uuid, nullable: true, description: "Backing file. Several episodes sharing one mediaItemId are a single combined rip." }
        durationSeconds: { type: number, nullable: true }
        positionSeconds: { type: number, nullable: true, description: "Current profile's resume position." }
        watched: { type: boolean, nullable: true }
        rating: { type: number, nullable: true, description: "Effective per-episode provider rating (vote_average), 0–10. Null when the provider has none." }

    SeasonSummary:
      type: object
      required: [id, seasonNumber, episodes]
      properties:
        id: { type: string, format: uuid }
        seasonNumber: { type: integer }
        title: { type: string, nullable: true }
        episodes: { type: array, items: { $ref: "#/components/schemas/EpisodeSummary" } }

    SeriesDetail:
      type: object
      required: [id, title, seasons]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        year: { type: integer, nullable: true }
        overview: { type: string, nullable: true }
        posterUrl: { type: string, nullable: true }
        backdropUrl: { type: string, nullable: true, description: "Landscape backdrop for full-screen heroes; falls back to posterUrl." }
        seasons: { type: array, items: { $ref: "#/components/schemas/SeasonSummary" } }
        cast: { type: array, items: { type: string }, description: "Top-billed cast names from the metadata provider. Omitted when none." }

security:
  - bearerAuth: []
