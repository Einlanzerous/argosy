openapi: 3.0.3
info:
  title: Argosy API
  version: 0.1.0
  description: |
    Self-hosted media streaming server. This spec is the single source of truth
    for the HTTP contract; the Go server interface and the TypeScript client are
    generated from it (`make generate`), and CI fails on drift.

servers:
  - url: /

tags:
  - name: system
  - name: auth

paths:
  /healthz:
    get:
      tags: [system]
      operationId: getHealth
      summary: Liveness/readiness probe
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok
        "503":
          description: A dependency (e.g. the database) is unavailable

  /api/v1/ping:
    get:
      tags: [system]
      operationId: ping
      summary: Service identity and version
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"

  /api/v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Authenticate an account and list its profiles
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; returns the account and its profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/devices:
    post:
      tags: [auth]
      operationId: registerDevice
      summary: Register a device for a profile and issue a device token
      description: |
        Re-authenticates with account credentials and binds a new device to the
        chosen profile, returning a bearer token used for all subsequent calls.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceRegistrationRequest"
      responses:
        "201":
          description: Device registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceRegistrationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [auth]
      operationId: listDevices
      summary: List devices in the current account (the Fleet)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/devices/{deviceId}:
    delete:
      tags: [auth]
      operationId: revokeDevice
      summary: Revoke a device token ("retire from the Fleet")
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Device revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/me:
    get:
      tags: [auth]
      operationId: getCurrentSession
      summary: Resolve the current (account, profile, device) from the token
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/libraries:
    get:
      tags: [library]
      operationId: listLibraries
      summary: List the account's libraries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Library"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/libraries/{libraryId}/movies:
    get:
      tags: [library]
      operationId: listMovies
      summary: Browse movies in a library
      parameters:
        - { name: libraryId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
        - { name: sort, in: query, schema: { type: string, enum: [title, added, year], default: title } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItemPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/libraries/{libraryId}/series:
    get:
      tags: [library]
      operationId: listSeries
      summary: Browse series in a library
      parameters:
        - { name: libraryId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
        - { name: sort, in: query, schema: { type: string, enum: [title, year], default: title } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/series/{seriesId}:
    get:
      tags: [library]
      operationId: getSeries
      summary: Series detail with seasons and episodes
      parameters:
        - { name: seriesId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/items/{itemId}:
    get:
      tags: [library]
      operationId: getMediaItem
      summary: Media item detail with effective metadata
      parameters:
        - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaItemDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Per-device token issued by registerDevice.

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    PingResponse:
      type: object
      required: [service, status, version]
      properties:
        service:
          type: string
          example: argosy
        status:
          type: string
          example: ok
        version:
          type: string
          example: dev

    Role:
      type: string
      enum: [admin, viewer]

    Account:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    UserProfile:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [account, profiles]
      properties:
        account:
          $ref: "#/components/schemas/Account"
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"

    DeviceRegistrationRequest:
      type: object
      required: [username, password, userId, deviceName]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        userId:
          type: string
          format: uuid
          description: The profile this device is bound to.
        deviceName:
          type: string

    Device:
      type: object
      required: [id, name, userId, revoked, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        userId:
          type: string
          format: uuid
          nullable: true
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        revoked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    DeviceRegistrationResponse:
      type: object
      required: [device, token]
      properties:
        device:
          $ref: "#/components/schemas/Device"
        token:
          type: string
          description: Bearer token for this device.

    Session:
      type: object
      required: [accountId, userId, deviceId, role]
      properties:
        accountId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/Role"

    Library:
      type: object
      required: [id, name, kind]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string }

    MediaItemSummary:
      type: object
      required: [id, kind, title]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string }
        title: { type: string }
        year: { type: integer, nullable: true }
        posterUrl: { type: string, nullable: true }

    MediaItemDetail:
      type: object
      required: [id, kind, title, filePath, reviewRequired]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string }
        title: { type: string }
        year: { type: integer, nullable: true }
        overview: { type: string, nullable: true }
        genres: { type: array, items: { type: string } }
        posterUrl: { type: string, nullable: true }
        durationSeconds: { type: number, nullable: true }
        container: { type: string, nullable: true }
        filePath: { type: string }
        reviewRequired: { type: boolean }

    MediaItemPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MediaItemSummary" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    SeriesSummary:
      type: object
      required: [id, title]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        year: { type: integer, nullable: true }
        posterUrl: { type: string, nullable: true }

    SeriesPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/SeriesSummary" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    EpisodeSummary:
      type: object
      required: [id, episodeNumber]
      properties:
        id: { type: string, format: uuid }
        episodeNumber: { type: integer }
        title: { type: string, nullable: true }
        mediaItemId: { type: string, format: uuid, nullable: true }

    SeasonSummary:
      type: object
      required: [id, seasonNumber, episodes]
      properties:
        id: { type: string, format: uuid }
        seasonNumber: { type: integer }
        title: { type: string, nullable: true }
        episodes: { type: array, items: { $ref: "#/components/schemas/EpisodeSummary" } }

    SeriesDetail:
      type: object
      required: [id, title, seasons]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        year: { type: integer, nullable: true }
        overview: { type: string, nullable: true }
        posterUrl: { type: string, nullable: true }
        seasons: { type: array, items: { $ref: "#/components/schemas/SeasonSummary" } }

security:
  - bearerAuth: []
